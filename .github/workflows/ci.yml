name: CI Pipeline                          # Display name in the Actions UI
run-name: "Build ${{ github.ref_name }} @ ${{ github.sha }}"  # Custom run title

on:                                        # Event triggers block
  push:
    branches: [main, 'release/*']
    paths-ignore: ['**.md', 'docs/**']    # Skip docs-only pushes
  
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  
  workflow_dispatch:                       # Manual trigger
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]
      dry_run:
        type: boolean
        default: true

env:                                       # Workflow-level env vars
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04                  # Pin version, not ubuntu-latest
    timeout-minutes: 1                    # Always set — prevents runaway bills
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                   # Full history (needed for semantic-release)
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          # cache: 'npm'
          
      # - run: npm ci
      # - run: npm test
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ --tb=short -v --exitfirst
        env:                              # Step-level env (narrowest scope)
          DATABASE_URL: ${{ secrets.TEST_DB_URL }}

      - name: Get version from file
        id: version                          # id is required to reference outputs
        run: |
          echo "1.0.0" > VERSION          # or manage this file manually
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV  # available to all following steps
    
      - name: Use version
        run: echo "Building ${{ steps.version.outputs.version }}"
        # $BUILD_VERSION also works here as a plain shell var
