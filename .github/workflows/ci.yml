name: CI Pipeline                          # Display name in the Actions UI
run-name: "Build ${{ github.ref_name }} @ ${{ github.sha }}"  # Custom run title

on:                                        # Event triggers block
  push:
    branches: [main, 'release/*']
    paths-ignore: ['**.md', 'docs/**']    # Skip docs-only pushes
  
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  
  workflow_dispatch:                       # Manual trigger
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]
      dry_run:
        type: boolean
        default: false

env:                                       # Workflow-level env vars
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Avoid warning for nodejs 20 deprecation

jobs:
  build:
    runs-on: ubuntu-24.04                  # Pin version, not ubuntu-latest
    timeout-minutes: 1                    # Always set — prevents runaway bills
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                   # Full history (needed for semantic-release)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ --tb=short -v --exitfirst
        env:                              # Step-level env (narrowest scope)
          DATABASE_URL: ${{ secrets.TEST_DB_URL }}
